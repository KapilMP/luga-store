name: Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        default: 'latest'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Firebase Service Account File
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-service-account.json

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/supreme-api
          tags: |
            type=raw,value=${{ github.event.inputs.version }}
            type=raw,value=latest,enable=${{ github.event.inputs.environment == 'production' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    concurrency: deploy_${{ github.event.inputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          # Database
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          # Storage
          STORAGE_REGION: ${{ secrets.STORAGE_REGION }}
          STORAGE_ACCESS_KEY_ID: ${{ secrets.STORAGE_ACCESS_KEY_ID }}
          STORAGE_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_SECRET_ACCESS_KEY }}
          STORAGE_BUCKET_NAME: ${{ secrets.STORAGE_BUCKET_NAME }}
          STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
          STORAGE_PUBLIC_URL: ${{ secrets.STORAGE_PUBLIC_URL }}
          # RabbitMQ
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          # App Config
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          # App Info
          VERSION: ${{ github.event.inputs.version }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ github.event.inputs.environment == 'production' && secrets.PROD_HOST || secrets.STAGING_HOST }}
          username: ${{ github.event.inputs.environment == 'production' && secrets.PROD_USER || secrets.STAGING_USER }}
          key: ${{ github.event.inputs.environment == 'production' && secrets.PROD_SSH_KEY || secrets.STAGING_SSH_KEY }}
          envs: DB_NAME,DB_USER,DB_PASSWORD,STORAGE_REGION,STORAGE_ACCESS_KEY_ID,STORAGE_SECRET_ACCESS_KEY,STORAGE_BUCKET_NAME,STORAGE_ENDPOINT,STORAGE_PUBLIC_URL,RABBITMQ_USER,RABBITMQ_PASSWORD,VERSION,GITHUB_REPOSITORY_OWNER,JWT_SECRET,JWT_ISSUER,JWT_AUDIENCE,RESEND_API_KEY,FRONTEND_URL
          script: |
            set -e
            PROJECT_DIR="/var/www/supreme-${{ github.event.inputs.environment }}"
            COMPOSE_FILE="docker-stack.${{ github.event.inputs.environment == 'production' && 'prod' || 'staging' }}.yml"
            STACK_NAME="supreme-${{ github.event.inputs.environment }}"
            
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            # Login to GHCR
            echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Ensure swarm is initialized
            docker swarm init 2>/dev/null || true

            # Pull latest stack files
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            fi
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            echo "Deploying stack $STACK_NAME with version $VERSION..."
            
            # Use docker stack deploy. 
            # The 'envs' passed above are already exported in this shell session.
            docker stack deploy -c $COMPOSE_FILE $STACK_NAME

            echo "Cleaning up..."
            docker image prune -f
            echo "Deployment successful!"
